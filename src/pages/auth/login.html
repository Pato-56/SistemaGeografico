<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Censo Hotelero Acapulco</title>
  <link rel="stylesheet" href="../../assets/styles/variables.css"/>
  <link rel="stylesheet" href="../../assets/styles/global.css"/>
  <link rel="stylesheet" href="../../assets/styles/components.css"/>
  <link rel="stylesheet" href="../../assets/styles/pages-standalone.css"/>
</head>
<body class="bg-dark-page" style="display:flex;align-items:center;justify-content:center;padding:30px 16px;">

<div class="login-wrapper">
  <div class="login-card">

    <!-- HEADER -->
    <header class="card-header-gradient" style="padding:36px 40px 32px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1;">

        <div class="uagro-brand">
          <div class="escudo escudo--sm">UAG</div>
          <div class="brand-text">
            <h1 style="font-size:15px;">Escuela de Turismo<br>UAGro</h1>
            <p class="brand-sub">Censo Hotelero · Acapulco</p>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div class="avatar-ring">
            <div class="avatar-inner">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:42px;height:42px;opacity:0.45;">
                <circle cx="12" cy="8" r="4" fill="#9baabe"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" fill="#9baabe"/>
              </svg>
            </div>
          </div>
        </div>
      </div>

      <div style="margin-top:24px;position:relative;z-index:1;">
        <h2 style="font-family:var(--font-serif);font-size:22px;color:white;font-weight:700;">Iniciar Sesión</h2>
        <p style="font-size:13px;color:rgba(200,215,255,0.65);margin-top:5px;">Accede al sistema de registro hotelero</p>
      </div>
    </header>

    <!-- BODY -->
    <div class="login-card" style="border-radius:0;box-shadow:none;">
      <div style="padding:36px 40px 40px;display:flex;flex-direction:column;gap:22px;background:white;">

        <!-- Mensaje de error -->
        <div id="loginError" style="display:none;background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.3);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--rojo);"></div>

        <div class="field">
          <label class="field-label"><span class="dot"></span>Correo Institucional</label>
          <input class="field-input" type="email" id="emailInput" placeholder="usuario@uagro.mx"/>
        </div>

        <div class="field">
          <label class="field-label"><span class="dot"></span>Contraseña</label>
          <div style="position:relative;">
            <input class="field-input" type="password" id="passInput" placeholder="••••••••"/>
            <button class="eye-btn" onclick="togglePass()" title="Mostrar/ocultar">👁</button>
          </div>
        </div>

        <div style="text-align:right;margin-top:-10px;">
          <a href="../auth/recuperar-contrasena.html" style="font-size:12px;color:var(--rojo);text-decoration:none;font-weight:500;transition:opacity 0.2s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">¿Olvidaste tu contraseña?</a>
        </div>

        <div class="divider-gradient"></div>

        <div style="display:flex;gap:14px;">
          <button class="btn-secondary" style="padding:15px 24px;" onclick="window.location.href='/'">Cancelar</button>
          <button class="btn-primary" id="btnLogin" style="flex:1;padding:15px 28px;font-size:15px;" onclick="handleLogin()">
            ✓ Iniciar sesión
          </button>
        </div>

      </div>
    </div>

  </div>
</div>

<script type="module" src="../../assets/js/login.js"></script>
</body>
</html>
