<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Perfil — Censo Hotelero</title>
  <link rel="stylesheet" href="../../assets/styles/variables.css"/>
  <link rel="stylesheet" href="../../assets/styles/global.css"/>
  <link rel="stylesheet" href="../../assets/styles/components.css"/>
  <link rel="stylesheet" href="../../assets/styles/pages-standalone.css"/>
</head>
<body class="bg-dark-page" style="display:flex;flex-direction:column;min-height:100vh;">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">
      <div class="escudo escudo--sm">UAG</div>
      <div class="brand-text">
        <h1 style="font-size:15px;">Censo Hotelero · Acapulco</h1>
        <p class="brand-sub">Escuela de Turismo — UAGro</p>
      </div>
    </div>
    <div class="navbar-right">
      <button onclick="navegar('dashboard')" title="Volver al dashboard"
        style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:7px 14px;border-radius:8px;font-family:var(--font-sans);font-size:12px;font-weight:600;cursor:pointer;">
        ← Dashboard
      </button>
      <div style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:7px 14px;">
        <div style="width:28px;height:28px;border-radius:50%;background:var(--rojo);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;" id="navInicial">—</div>
        <div>
          <div style="font-size:12px;font-weight:600;color:white;line-height:1.2;" id="navUsuario">Cargando…</div>
          <div style="font-size:10px;color:rgba(200,215,255,0.6);" id="navRol">—</div>
        </div>
      </div>
      <button onclick="cerrarSesion()" title="Cerrar sesión"
        style="background:rgba(192,57,43,0.2);border:1px solid rgba(192,57,43,0.4);color:var(--rojo-suave);padding:7px 12px;border-radius:8px;font-family:var(--font-sans);font-size:12px;cursor:pointer;">
        🚪
      </button>
    </div>
  </nav>

  <!-- Contenido -->
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:30px 16px;">
  <div style="width:100%;max-width:560px;">

    <div style="background:white;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.25);">

      <!-- Header -->
      <div class="card-header-gradient" style="padding:28px 36px;">
        <div style="display:flex;align-items:center;gap:18px;position:relative;z-index:1;">
          <div style="width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:white;" id="perfilInicial">—</div>
          <div>
            <h2 style="font-family:var(--font-serif);font-size:20px;font-weight:700;color:white;line-height:1.3;" id="perfilNombreHeader">Mi Perfil</h2>
            <div style="font-size:12px;color:rgba(200,215,255,0.65);margin-top:4px;" id="perfilRolHeader">—</div>
            <div style="font-size:11px;color:rgba(200,215,255,0.45);margin-top:2px;" id="perfilCorreoHeader">—</div>
          </div>
        </div>
      </div>

      <!-- Formulario -->
      <div style="padding:28px 36px 36px;display:flex;flex-direction:column;gap:20px;">

        <!-- Mensaje toast interno -->
        <div id="perfilMsg" style="display:none;border-radius:10px;padding:12px 16px;font-size:13px;font-weight:600;"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">
          <div class="field">
            <label class="field-label"><span class="dot"></span>Nombre <span style="color:var(--rojo);">✱</span></label>
            <input class="field-input" type="text" id="pNombre" placeholder="Ej. Valentina"/>
          </div>
          <div class="field">
            <label class="field-label"><span class="dot"></span>Apellido</label>
            <input class="field-input" type="text" id="pApellido" placeholder="Ej. Torres Salgado"/>
          </div>
          <div class="field" style="grid-column:1/-1;">
            <label class="field-label"><span class="dot"></span>Correo institucional</label>
            <input class="field-input" type="email" id="pCorreo" placeholder="usuario@uagro.mx" readonly style="opacity:0.6;cursor:not-allowed;"/>
            <div style="font-size:11px;color:#9baabe;margin-top:4px;">El correo no se puede modificar.</div>
          </div>
          <div class="field">
            <label class="field-label"><span class="dot"></span>Teléfono</label>
            <input class="field-input" type="tel" id="pTelefono" placeholder="+52 747 000 0000"/>
          </div>
          <div class="field">
            <label class="field-label"><span class="dot"></span>Rol</label>
            <input class="field-input" type="text" id="pRol" readonly style="opacity:0.6;cursor:not-allowed;"/>
          </div>
        </div>

        <div class="divider-gradient"></div>

        <div style="font-size:12px;font-weight:600;color:var(--azul-medio);letter-spacing:1px;text-transform:uppercase;">Cambiar contraseña (opcional)</div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">
          <div class="field">
            <label class="field-label"><span class="dot"></span>Nueva contraseña</label>
            <div style="position:relative;">
              <input class="field-input" type="password" id="pPass1" placeholder="Mínimo 8 caracteres"/>
              <button class="eye-btn" onclick="togglePass('pPass1')">👁</button>
            </div>
          </div>
          <div class="field">
            <label class="field-label"><span class="dot"></span>Confirmar contraseña</label>
            <div style="position:relative;">
              <input class="field-input" type="password" id="pPass2" placeholder="Repite la contraseña"/>
              <button class="eye-btn" onclick="togglePass('pPass2')">👁</button>
            </div>
          </div>
        </div>

        <div class="divider-gradient"></div>

        <div style="display:flex;gap:14px;">
          <button class="btn-secondary" style="padding:14px 24px;" onclick="navegar('dashboard')">← Volver</button>
          <button class="btn-primary" style="flex:1;padding:14px 28px;font-size:15px;" onclick="guardarPerfil()">✓ Guardar cambios</button>
        </div>

      </div>
    </div>

  </div>
  </div>

<script type="module" src="../../assets/js/perfil.js"></script>
</body>
</html>
